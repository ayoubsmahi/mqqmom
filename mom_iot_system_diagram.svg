<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#121820"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2733"/>
      <stop offset="100%" stop-color="#151b24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#fb923c"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#f472b6"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #94a3b8; }
      .box-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #f1f5f9; }
      .box-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .box-small { font: 400 12px Arial, Helvetica, sans-serif; fill: #94a3b8; }
      .label { font: 600 13px Arial, Helvetica, sans-serif; fill: #e2e8f0; }
      .topic { font: 700 12px Consolas, Monaco, monospace; fill: #93c5fd; }
      .legend { font: 400 13px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="40" y="28" width="1320" height="72" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="700" y="58" text-anchor="middle" class="title">MOM IoT Air Quality System</text>
  <text x="700" y="84" text-anchor="middle" class="subtitle">End-to-end architecture: sensor node, bridge, MQTT broker, persistence, and web dashboard</text>

  <!-- Physical layer -->
  <text x="80" y="140" class="label" fill="#64748b">PHYSICAL LAYER</text>

  <g filter="url(#shadow)">
    <rect x="70" y="155" width="250" height="250" rx="16" fill="url(#boxGrad)" stroke="#475569" stroke-width="1.5"/>
    <rect x="70" y="155" width="250" height="8" rx="16" fill="url(#accent)"/>
    <text x="195" y="195" text-anchor="middle" class="box-title">Elegoo Uno R3</text>
    <text x="195" y="222" text-anchor="middle" class="box-text">ATmega328P Firmware</text>

    <rect x="95" y="245" width="90" height="58" rx="10" fill="#0f172a" stroke="#64748b"/>
    <text x="140" y="268" text-anchor="middle" class="box-small">MQ135</text>
    <text x="140" y="286" text-anchor="middle" class="box-small">Analog A0</text>

    <rect x="205" y="245" width="90" height="58" rx="10" fill="#0f172a" stroke="#64748b"/>
    <text x="250" y="268" text-anchor="middle" class="box-small">5V Relay</text>
    <text x="250" y="286" text-anchor="middle" class="box-small">Digital Pin 8</text>

    <rect x="145" y="325" width="100" height="42" rx="10" fill="#172554" stroke="#3b82f6"/>
    <text x="195" y="351" text-anchor="middle" class="box-small" fill="#bfdbfe">Fan / Actuator</text>

    <line x1="140" y1="303" x2="140" y2="245" stroke="#64748b" stroke-width="2"/>
    <line x1="250" y1="303" x2="250" y2="325" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- USB -->
  <path d="M320 280 C360 280, 380 280, 420 280" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="370" y="265" text-anchor="middle" class="box-small">USB Serial</text>
  <text x="370" y="305" text-anchor="middle" class="box-small">/dev/ttyACM0 · 9600 baud</text>

  <!-- Host / server -->
  <text x="470" y="140" class="label" fill="#64748b">HOST / SERVER (Linux PC)</text>

  <rect x="450" y="155" width="880" height="620" rx="18" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Bridge -->
  <g filter="url(#shadow)">
    <rect x="480" y="190" width="240" height="150" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="480" y="190" width="240" height="6" rx="14" fill="#3b82f6"/>
    <text x="600" y="225" text-anchor="middle" class="box-title">mqtt_bridge.py</text>
    <text x="600" y="250" text-anchor="middle" class="box-text">Serial ” MQTT bridge</text>
    <text x="600" y="275" text-anchor="middle" class="box-small">Reads sensor lines from USB</text>
    <text x="600" y="295" text-anchor="middle" class="box-small">Forwards ON/OFF to Arduino</text>
    <text x="600" y="320" text-anchor="middle" class="topic">publish + subscribe</text>
  </g>

  <!-- MQTT Broker -->
  <g filter="url(#shadow)">
    <rect x="790" y="190" width="260" height="150" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="790" y="190" width="260" height="6" rx="14" fill="#06b6d4"/>
    <text x="920" y="225" text-anchor="middle" class="box-title">MQTT Broker</text>
    <text x="920" y="250" text-anchor="middle" class="box-text">Mosquitto</text>
    <text x="920" y="275" text-anchor="middle" class="box-small">localhost : 1883</text>
    <text x="920" y="300" text-anchor="middle" class="topic">sensors/air_quality</text>
    <text x="920" y="320" text-anchor="middle" class="topic">devices/fan/control</text>
  </g>

  <!-- Logger -->
  <g filter="url(#shadow)">
    <rect x="480" y="390" width="240" height="150" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="480" y="390" width="240" height="6" rx="14" fill="#34d399"/>
    <text x="600" y="425" text-anchor="middle" class="box-title">db_logger_alerter.py</text>
    <text x="600" y="450" text-anchor="middle" class="box-text">MQTT subscriber + alerts</text>
    <text x="600" y="475" text-anchor="middle" class="box-small">Logs every reading to SQLite</text>
    <text x="600" y="495" text-anchor="middle" class="box-small">Terminal warning if value &gt; 300</text>
    <text x="600" y="520" text-anchor="middle" class="topic">sub: sensors/air_quality</text>
  </g>

  <!-- Database -->
  <g filter="url(#shadow)">
    <rect x="790" y="390" width="260" height="150" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="790" y="390" width="260" height="6" rx="14" fill="#a78bfa"/>
    <text x="920" y="425" text-anchor="middle" class="box-title">SQLite Database</text>
    <text x="920" y="450" text-anchor="middle" class="box-text">air_quality_data.db</text>
    <text x="920" y="475" text-anchor="middle" class="box-small">Table: sensor_logs</text>
    <text x="920" y="495" text-anchor="middle" class="box-small">id · timestamp · value</text>
    <text x="920" y="520" text-anchor="middle" class="box-small">Last 50 rows used by dashboard</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#shadow)">
    <rect x="480" y="590" width="570" height="155" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="480" y="590" width="570" height="6" rx="14" fill="#f472b6"/>
    <text x="765" y="625" text-anchor="middle" class="box-title">dashboard.py · Streamlit Web UI</text>
    <text x="765" y="650" text-anchor="middle" class="box-text">MOM IoT Dashboard · http://localhost:8501</text>
    <text x="600" y="680" text-anchor="middle" class="box-small">Live metric + line chart (auto-refresh 2s)</text>
    <text x="930" y="680" text-anchor="middle" class="box-small">Fan ON/OFF buttons</text>
    <text x="600" y="710" text-anchor="middle" class="topic">read: SQLite</text>
    <text x="930" y="710" text-anchor="middle" class="topic">pub: devices/fan/control</text>
  </g>

  <!-- Browser -->
  <g filter="url(#shadow)">
    <rect x="1090" y="590" width="210" height="155" rx="14" fill="url(#boxGrad)" stroke="#475569"/>
    <rect x="1090" y="590" width="210" height="6" rx="14" fill="#fbbf24"/>
    <text x="1195" y="630" text-anchor="middle" class="box-title">Web Browser</text>
    <text x="1195" y="658" text-anchor="middle" class="box-text">Presentation / User</text>
    <text x="1195" y="685" text-anchor="middle" class="box-small">Views charts</text>
    <text x="1195" y="705" text-anchor="middle" class="box-small">Controls fan remotely</text>
  </g>

  <!-- Connection arrows -->

  <!-- Uno to bridge -->
  <path d="M320 250 L420 250" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="370" y="238" text-anchor="middle" class="box-small">sensor values</text>

  <path d="M420 310 L320 310" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="370" y="332" text-anchor="middle" class="box-small">ON / OFF commands</text>

  <!-- Bridge to MQTT -->
  <path d="M720 240 L790 240" fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="755" y="228" text-anchor="middle" class="topic">publish</text>

  <path d="M790 290 L720 290" fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="755" y="308" text-anchor="middle" class="topic">subscribe</text>

  <!-- MQTT to logger -->
  <path d="M920 340 L920 370 L600 370 L600 390" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="760" y="362" text-anchor="middle" class="topic">sensors/air_quality</text>

  <!-- Logger to DB -->
  <path d="M720 465 L790 465" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrowPink)"/>
  <text x="755" y="453" text-anchor="middle" class="box-small">INSERT rows</text>

  <!-- DB to dashboard -->
  <path d="M920 540 L920 565 L765 565 L765 590" fill="none" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrowPink)"/>
  <text x="845" y="557" text-anchor="middle" class="box-small">SELECT last 50</text>

  <!-- Dashboard to MQTT -->
  <path d="M765 590 L765 570 L1080 570 L1080 340 L1050 340" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="1120" y="455" text-anchor="middle" class="topic" transform="rotate(-90 1120 455)">devices/fan/control</text>

  <!-- Dashboard to browser -->
  <path d="M1050 668 L1090 668" fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="1070" y="656" text-anchor="middle" class="box-small">HTTP</text>

  <!-- Legend -->
  <rect x="70" y="455" width="250" height="220" rx="14" fill="#111827" stroke="#334155"/>
  <text x="195" y="485" text-anchor="middle" class="box-title">Data Flow Legend</text>
  <line x1="95" y1="510" x2="135" y2="510" stroke="#94a3b8" stroke-width="3"/>
  <text x="150" y="515" class="legend">USB serial (9600 baud)</text>
  <line x1="95" y1="540" x2="135" y2="540" stroke="#60a5fa" stroke-width="3"/>
  <text x="150" y="545" class="legend">MQTT publish / subscribe</text>
  <line x1="95" y1="570" x2="135" y2="570" stroke="#34d399" stroke-width="3"/>
  <text x="150" y="575" class="legend">Sensor topic stream</text>
  <line x1="95" y1="600" x2="135" y2="600" stroke="#a78bfa" stroke-width="3"/>
  <text x="150" y="605" class="legend">Database read / write</text>
  <line x1="95" y1="630" x2="135" y2="630" stroke="#fb923c" stroke-width="3"/>
  <text x="150" y="635" class="legend">Fan control commands</text>
  <line x1="95" y1="660" x2="135" y2="660" stroke="#fbbf24" stroke-width="3"/>
  <text x="150" y="665" class="legend">Web UI access</text>

  <!-- Footer note -->
  <text x="700" y="870" text-anchor="middle" class="subtitle">Run in parallel: mqtt_bridge.py · db_logger_alerter.py · streamlit run dashboard.py · Mosquitto broker</text>
</svg>
